name: FTR Daily Pull & Report

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-pull-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install boto3 requests pandas numpy openpyxl
      
      - name: Run FTR Daily Pull
        env:
          FTR_CLIENT_ID: ${{ secrets.FTR_CLIENT_ID }}
          FTR_USERNAME: ${{ secrets.FTR_USERNAME }}
          FTR_PASSWORD: ${{ secrets.FTR_PASSWORD }}
        run: |
          python ftr_daily_pull_github.py
      
      - name: Generate Daily Report
        id: report
        run: |
          python ftr_report_generator_daily.py
          REPORT_FILE=$(ls -t ftr_tracking/reports/FTR_Daily_Report_*.xlsx 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ]; then
            echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            echo "report_name=$(basename $REPORT_FILE)" >> "$GITHUB_OUTPUT"
          else
            echo "report_file=" >> "$GITHUB_OUTPUT"
            echo "report_name=" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ftr_tracking/
          git diff --staged --quiet || git commit -m "FTR Daily Pull & Report - $(date +'%Y-%m-%d')"
          git push
      
      - name: Send Daily Report Email
        if: steps.report.outputs.report_file != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "FTR Daily Report - ${{ steps.report.outputs.report_name }}"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            FTR Daily Report attached.
            
            Generated by GitHub Actions
          attachments: ${{ steps.report.outputs.report_file }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: daily-pull-and-report
    if: failure()
    steps:
      - name: Send Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ FTR Daily Pull FAILED"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            The FTR Daily Pull failed!
            
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
