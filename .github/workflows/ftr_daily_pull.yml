name: FTR Daily Pull and Report

on:
  schedule:
    # 6 AM NZDT = 5 PM UTC (NZDT is UTC+13)
    - cron: '0 17 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ftr-daily-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy requests openpyxl
      
      - name: Run FTR Daily Pull
        env:
          FTR_CLIENT_ID: ${{ secrets.FTR_CLIENT_ID }}
          FTR_USERNAME: ${{ secrets.FTR_USERNAME }}
          FTR_PASSWORD: ${{ secrets.FTR_PASSWORD }}
        run: |
          python ftr_daily_pull_github.py
      
      - name: Generate Daily Report
        id: report
        run: |
          python ftr_report_generator.py
          # Get the report file path
          REPORT_FILE=$(ls -t ftr_tracking/reports/FTR_Daily_Report_*.xlsx 2>/dev/null | head -1)
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          
          # Get email summary
          if [ -f "ftr_tracking/reports/email_summary.txt" ]; then
            echo "email_body<<EOF" >> $GITHUB_OUTPUT
            cat ftr_tracking/reports/email_summary.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ftr_tracking/
          git diff --staged --quiet || git commit -m "Daily FTR update $(date +'%Y-%m-%d')"
          git push
      
      - name: Send Daily Report Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "FTR Daily Report - ${{ github.event.repository.name }}"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Trading Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            ${{ steps.report.outputs.email_body }}
            
            ---
            This is an automated report from GitHub Actions.
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_number }}
          attachments: ${{ steps.report.outputs.report_file }}
      
      - name: Notify on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ FTR Daily Pull FAILED - ${{ github.event.repository.name }}"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Trading Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            The FTR Daily Pull workflow has failed!
            
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_number }}
            
            Please check the GitHub Actions logs for details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
