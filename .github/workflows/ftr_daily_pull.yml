name: FTR Daily Pull & Report

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-pull-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install boto3 requests pandas numpy openpyxl
      
      - name: Run FTR Daily Pull
        env:
          FTR_CLIENT_ID: ${{ secrets.FTR_CLIENT_ID }}
          FTR_USERNAME: ${{ secrets.FTR_USERNAME }}
          FTR_PASSWORD: ${{ secrets.FTR_PASSWORD }}
        run: |
          python ftr_daily_pull_github.py
      
      - name: Download Spot Prices
        run: |
          CURRENT_MONTH=$(date +'%Y%m')
          python download_spot_prices.py $CURRENT_MONTH
      
      - name: Generate Daily Report
        id: report
        run: |
          python ftr_report_generator_daily.py
          python generate_fltr_email.py '' FLTR
          python generate_fltr_email.py '' BRAD
          python generate_fltr_email.py '' SWET
          REPORT_FILE=$(ls -t ftr_tracking/reports/FTR_Daily_Report_*.xlsx 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ]; then
            echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            echo "report_name=$(basename $REPORT_FILE)" >> "$GITHUB_OUTPUT"
          else
            echo "report_file=" >> "$GITHUB_OUTPUT"
            echo "report_name=" >> "$GITHUB_OUTPUT"
          fi
          # Build email body: main summary + FLTR section
          EMAIL_BODY=""
          if [ -f "ftr_tracking/reports/email_summary.txt" ]; then
            EMAIL_BODY=$(cat ftr_tracking/reports/email_summary.txt)
          fi
          if [ -f "ftr_tracking/reports/fltr_email_summary.txt" ]; then
            FLTR_BODY=$(cat ftr_tracking/reports/fltr_email_summary.txt)
            EMAIL_BODY="${EMAIL_BODY}

${FLTR_BODY}"
          fi
          if [ -z "$EMAIL_BODY" ]; then
            EMAIL_BODY="FTR Daily Report attached."
          fi
          echo "email_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$EMAIL_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Store BRAD and SWET emails for separate sends
          if [ -f "ftr_tracking/reports/brad_email_summary.txt" ]; then
            BRAD_BODY=$(cat ftr_tracking/reports/brad_email_summary.txt)
            echo "brad_email<<EOF" >> "$GITHUB_OUTPUT"
            echo "$BRAD_BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "ftr_tracking/reports/swet_email_summary.txt" ]; then
            SWET_BODY=$(cat ftr_tracking/reports/swet_email_summary.txt)
            echo "swet_email<<EOF" >> "$GITHUB_OUTPUT"
            echo "$SWET_BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ftr_tracking/
          git diff --staged --quiet || git commit -m "FTR Daily Pull & Report - $(date +'%Y-%m-%d')"
          git push
      
      - name: Send Daily Report Email
        if: steps.report.outputs.report_file != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "FTR Daily Report - ${{ steps.report.outputs.report_name }}"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: ${{ steps.report.outputs.email_body }}
          attachments: ${{ steps.report.outputs.report_file }}
      
      - name: Send BRAD Portfolio Email
        if: steps.report.outputs.brad_email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "BRAD Portfolio Update - $(date +'%Y-%m-%d')"
          to: ${{ secrets.EMAIL_TO_BRAD }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: ${{ steps.report.outputs.brad_email }}
      
      - name: Send SWET Portfolio Email
        if: steps.report.outputs.swet_email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "SWET Portfolio Update - $(date +'%Y-%m-%d')"
          to: ${{ secrets.EMAIL_TO_SWET }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: ${{ steps.report.outputs.swet_email }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: daily-pull-and-report
    if: failure()
    steps:
      - name: Send Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ FTR Daily Pull FAILED"
          to: ${{ secrets.EMAIL_TO }}
          from: FTR Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            The FTR Daily Pull failed!
            
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
